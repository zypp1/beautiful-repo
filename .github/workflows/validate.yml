name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pushes stay cheap: no dependency install and no full test/audit run.
      - uses: actions/setup-python@v5
        if: github.event_name != 'push'
        with:
          python-version: "3.11"

      - name: Check required skill files
        run: |
          test -f skills/beautiful-repo/SKILL.md
          test -f skills/beautiful-repo/agents/openai.yaml
          test -f skills/beautiful-repo/scripts/audit_dl_repo.py
          test -f skills/beautiful-repo/assets/readme-templates/visual-research-readme.md
          test -f assets/beautiful-repo.svg
          test -f skills/beautiful-repo/references/code-style-standard.md
          test -f skills/beautiful-repo/references/high-impact-patterns.md
          test -f skills/beautiful-repo/references/readme-standard.md
          test -f skills/beautiful-repo/references/repo-type-playbooks.md
          test -f skills/beautiful-repo/references/sources-reviewed.md
          test -f skills/beautiful-repo/references/research-release-standard.md
          test -f skills/beautiful-repo/references/migration-playbook.md
          test -f skills/beautiful-repo/references/framework-notes.md

      - name: Check skill metadata
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path("skills/beautiful-repo/SKILL.md").read_text(encoding="utf-8")
          assert text.startswith("---\n"), "SKILL.md must start with YAML frontmatter"
          frontmatter = text.split("---", 2)[1]
          assert "name: beautiful-repo" in frontmatter
          assert "description:" in frontmatter
          PY

      - name: Check audit script syntax
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          path = Path("skills/beautiful-repo/scripts/audit_dl_repo.py")
          ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
          PY

      - name: Run tests
        if: github.event_name != 'push'
        run: python -m unittest discover -s tests

      - name: Run audit script on this repository
        if: github.event_name != 'push'
        run: python skills/beautiful-repo/scripts/audit_dl_repo.py . || test $? -eq 1
