name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check required skill files
        run: |
          test -f skills/deeprepo-forge/SKILL.md
          test -f skills/deeprepo-forge/agents/openai.yaml
          test -f skills/deeprepo-forge/scripts/audit_dl_repo.py
          test -f skills/deeprepo-forge/assets/readme-templates/visual-research-readme.md
          test -f skills/deeprepo-forge/references/code-style-standard.md
          test -f skills/deeprepo-forge/references/high-impact-patterns.md
          test -f skills/deeprepo-forge/references/readme-standard.md
          test -f skills/deeprepo-forge/references/sources-reviewed.md
          test -f skills/deeprepo-forge/references/research-release-standard.md
          test -f skills/deeprepo-forge/references/migration-playbook.md
          test -f skills/deeprepo-forge/references/framework-notes.md

      - name: Check skill metadata
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path("skills/deeprepo-forge/SKILL.md").read_text(encoding="utf-8")
          assert text.startswith("---\n"), "SKILL.md must start with YAML frontmatter"
          frontmatter = text.split("---", 2)[1]
          assert "name: deeprepo-forge" in frontmatter
          assert "description:" in frontmatter
          PY

      - name: Compile audit script
        run: python -m py_compile skills/deeprepo-forge/scripts/audit_dl_repo.py

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run audit script on this repository
        run: python skills/deeprepo-forge/scripts/audit_dl_repo.py . || true
