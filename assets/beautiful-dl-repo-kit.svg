<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Beautiful DL Repo Kit banner</title>
  <desc id="desc">A visual summary showing a deep learning repository becoming reproducible, polished, and citation-ready.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.48" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#ECFEFF" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <circle cx="1035" cy="54" r="132" fill="#38BDF8" opacity="0.16"/>
  <circle cx="89" cy="375" r="150" fill="#A7F3D0" opacity="0.16"/>

  <g transform="translate(70 62)">
    <text x="0" y="0" fill="#DBEAFE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">✨ CODEX SKILL</text>
    <text x="0" y="58" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="800">Beautiful DL Repo Kit</text>
    <text x="2" y="104" fill="#D1FAE5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="600">Turn messy deep learning repos into polished, reproducible releases.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="214" width="245" height="122" rx="18" fill="url(#card)"/>
    <text x="95" y="259" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="800">🎨 Visual README</text>
    <text x="95" y="293" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Hero, badges, gallery</text>
    <text x="95" y="319" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">and model cards.</text>

    <rect x="345" y="214" width="245" height="122" rx="18" fill="url(#card)"/>
    <text x="370" y="259" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="800">🧪 Reproducible</text>
    <text x="370" y="293" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Configs, checkpoints,</text>
    <text x="370" y="319" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">metrics and smoke tests.</text>

    <rect x="620" y="214" width="245" height="122" rx="18" fill="url(#card)"/>
    <text x="645" y="259" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="800">🧠 Clean Code</text>
    <text x="645" y="293" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Tensor contracts, names,</text>
    <text x="645" y="319" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">docstrings and boundaries.</text>

    <rect x="895" y="214" width="235" height="122" rx="18" fill="url(#card)"/>
    <text x="920" y="259" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="800">📚 Citation-ready</text>
    <text x="920" y="293" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">CITATION.cff, model</text>
    <text x="920" y="319" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">cards and limitations.</text>
  </g>

  <g transform="translate(815 66)">
    <rect x="0" y="0" width="315" height="92" rx="18" fill="#020617" opacity="0.42"/>
    <text x="25" y="38" fill="#E0F2FE" font-family="Consolas, Menlo, monospace" font-size="18">repo/README.md</text>
    <text x="25" y="68" fill="#BBF7D0" font-family="Consolas, Menlo, monospace" font-size="18">score: beautiful ✓</text>
  </g>
</svg>
